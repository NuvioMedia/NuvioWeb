  <script>
    (function configureTizenLaunch() {
      var root = typeof globalThis !== "undefined" ? globalThis : window;
      var search = String((window.location && window.location.search) || "").toLowerCase();
      var userAgent = String((window.navigator && window.navigator.userAgent) || "").toLowerCase();
      var webapis = root.webapis || {};
      var isTizenLaunch = Boolean(
        root.__NUVIO_PLATFORM__ === "tizen"
        || root.tizen
        || root.avplay
        || webapis.avplay
        || webapis.avPlay
        || webapis.productinfo
        || search.indexOf("wrapper=tizen") !== -1
        || userAgent.indexOf("tizen") !== -1
      );

      if (!isTizenLaunch) {
        return;
      }

      root.__NUVIO_PLATFORM__ = "tizen";
      var viewport = document.querySelector("meta[name='viewport']");
      if (!viewport) {
        viewport = document.createElement("meta");
        viewport.name = "viewport";
        document.head.appendChild(viewport);
      }
      viewport.setAttribute("content", "width=1920, height=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
    }());
  </script>

  <script>
    (function registerNuvioServiceWorker() {
      var root = typeof globalThis !== "undefined" ? globalThis : window;
      var userAgent = String((window.navigator && window.navigator.userAgent) || "").toLowerCase();
      // The service worker only makes sense for the browser/PWA build. TV
      // containers (Tizen/webOS) run packaged and must not register it.
      var isTvLaunch = Boolean(
        root.__NUVIO_PLATFORM__ === "tizen"
        || root.__NUVIO_PLATFORM__ === "webos"
        || root.tizen
        || root.webOS
        || root.PalmSystem
        || root.webOSSystem
        || userAgent.indexOf("tizen") !== -1
        || userAgent.indexOf("webos") !== -1
        || userAgent.indexOf("web0s") !== -1
      );
      if (isTvLaunch || !("serviceWorker" in navigator)) {
        return;
      }
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").then(function (registration) {
          // Activate an updated worker as soon as it has installed so users
          // don't get stuck on a stale shell across releases.
          registration.addEventListener("updatefound", function () {
            var installing = registration.installing;
            if (!installing) {
              return;
            }
            installing.addEventListener("statechange", function () {
              if (installing.state === "installed" && navigator.serviceWorker.controller) {
                installing.postMessage("SKIP_WAITING");
              }
            });
          });
        }).catch(function (error) {
          console.warn("Service worker registration failed", error);
        });
      });
      var reloading = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (reloading) {
          return;
        }
        reloading = true;
        window.location.reload();
      });
    }());
  </script>
