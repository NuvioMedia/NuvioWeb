name: Release TV Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build platform artifacts for
        required: true

jobs:
  resolve-release-payload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.payload.outputs.tag }}
    steps:
      - name: Resolve release payload
        id: payload
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

  build-webos-release:
    runs-on: ubuntu-latest
    needs: resolve-release-payload
    permissions:
      contents: write
    outputs:
      package_name: ${{ steps.package.outputs.package_name }}
      package_sha256: ${{ steps.package.outputs.package_sha256 }}
      package_size: ${{ steps.package.outputs.package_size }}
      package_version: ${{ steps.package.outputs.package_version }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release-payload.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Write release local properties
        env:
          NUVIO_LOCAL_PROPERTIES: ${{ secrets.NUVIO_LOCAL_PROPERTIES }}
          WEBOS_LOCAL_PROPERTIES: ${{ secrets.WEBOS_LOCAL_PROPERTIES }}
        run: |
          LOCAL_PROPERTIES="${NUVIO_LOCAL_PROPERTIES:-$WEBOS_LOCAL_PROPERTIES}"
          if [ -z "${LOCAL_PROPERTIES//[[:space:]]/}" ]; then
            echo "::error::NUVIO_LOCAL_PROPERTIES secret is required to build release artifacts with runtime env."
            exit 1
          fi
          printf '%s\n' "$LOCAL_PROPERTIES" > local.properties
      - name: Install dependencies
        run: npm ci

      - name: Package local webOS IPK
        env:
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
          NUVIO_REQUIRE_LOCAL_PROPERTIES: "1"
        run: npm run package:webos

      - name: Normalize webOS package metadata
        id: package
        env:
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
        run: |
          VERSION="${TAG_NAME#v}"
          set -- space.nuvio.webos_*_all.ipk
          if [ ! -e "$1" ]; then
            echo "Expected webOS package was not created" >&2
            exit 1
          fi
          PACKAGE_FILE="$1"
          TARGET_FILE="NuvioTV-webOS-${TAG_NAME}.ipk"
          mv "$PACKAGE_FILE" "$TARGET_FILE"
          SHA256=$(shasum -a 256 "$TARGET_FILE" | cut -d' ' -f1)
          SIZE=$(wc -c < "$TARGET_FILE" | tr -d ' ')
          echo "package_name=$TARGET_FILE" >> "$GITHUB_OUTPUT"
          echo "package_sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "package_size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "package_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload webOS IPK to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
          PACKAGE_NAME: ${{ steps.package.outputs.package_name }}
        run: gh release upload "$TAG_NAME" "$PACKAGE_NAME" --clobber

  update-webos-metadata:
    runs-on: ubuntu-latest
    needs:
      - resolve-release-payload
      - build-webos-release
    permissions:
      contents: read
    steps:
      - name: Check out webOS metadata repo
        if: ${{ vars.WEBOS_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.WEBOS_REPO }}
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Resolve live webOS release asset metadata
        id: live_webos_asset
        if: ${{ vars.WEBOS_REPO != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release-payload.outputs.tag }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          ASSET_NAME="NuvioTV-webOS-${RELEASE_TAG}.ipk"
          ASSET_DIGEST=$(gh release view "$RELEASE_TAG" --repo "$SOURCE_REPO" --json assets --jq ".assets[] | select(.name == \"$ASSET_NAME\") | .digest")
          ASSET_SIZE=$(gh release view "$RELEASE_TAG" --repo "$SOURCE_REPO" --json assets --jq ".assets[] | select(.name == \"$ASSET_NAME\") | .size")
          if [ -z "$ASSET_DIGEST" ] || [ "$ASSET_DIGEST" = "null" ] || [ -z "$ASSET_SIZE" ] || [ "$ASSET_SIZE" = "null" ]; then
            echo "Unable to resolve release asset metadata for $ASSET_NAME" >&2
            exit 1
          fi
          echo "package_sha256=${ASSET_DIGEST#sha256:}" >> "$GITHUB_OUTPUT"
          echo "package_size=$ASSET_SIZE" >> "$GITHUB_OUTPUT"

      - name: Refresh Homebrew repository metadata
        if: ${{ vars.WEBOS_REPO != '' }}
        env:
          RELEASE_TAG: ${{ needs.resolve-release-payload.outputs.tag }}
          PACKAGE_SHA256: ${{ steps.live_webos_asset.outputs.package_sha256 }}
          PACKAGE_SIZE: ${{ steps.live_webos_asset.outputs.package_size }}
          PACKAGE_VERSION: ${{ needs.build-webos-release.outputs.package_version }}
        run: |
          RELEASE_TAG="$RELEASE_TAG" PACKAGE_SHA256="$PACKAGE_SHA256" PACKAGE_SIZE="$PACKAGE_SIZE" PACKAGE_VERSION="$PACKAGE_VERSION" node -e "const fs=require('fs');const file='webosbrew/apps.json';const data=JSON.parse(fs.readFileSync(file,'utf8'));const pkg=data.packages[0];pkg.manifest.version=process.env.PACKAGE_VERSION;pkg.manifest.ipkUrl='https://github.com/NuvioMedia/NuvioWeb/releases/download/'+process.env.RELEASE_TAG+'/NuvioTV-webOS-'+process.env.RELEASE_TAG+'.ipk';pkg.manifest.ipkHash.sha256=process.env.PACKAGE_SHA256;pkg.manifest.ipkSize=Number(process.env.PACKAGE_SIZE);fs.writeFileSync(file, JSON.stringify(data, null, 2)+'\n');"

      - name: Commit webOS metadata update
        if: ${{ vars.WEBOS_REPO != '' }}
        env:
          RELEASE_TAG: ${{ needs.resolve-release-payload.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add webosbrew/apps.json
          if git diff --cached --quiet; then
            echo "No webOS metadata changes to commit"
            exit 0
          fi
          git commit -m "Update webOS repository metadata for ${RELEASE_TAG}"
          git push origin HEAD:main

  build-tizen-release:
    runs-on: ubuntu-latest
    needs: resolve-release-payload
    permissions:
      contents: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release-payload.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Write release local properties
        env:
          NUVIO_LOCAL_PROPERTIES: ${{ secrets.NUVIO_LOCAL_PROPERTIES }}
          TIZEN_LOCAL_PROPERTIES: ${{ secrets.TIZEN_LOCAL_PROPERTIES }}
          WEBOS_LOCAL_PROPERTIES: ${{ secrets.WEBOS_LOCAL_PROPERTIES }}
        run: |
          LOCAL_PROPERTIES="${NUVIO_LOCAL_PROPERTIES:-${TIZEN_LOCAL_PROPERTIES:-$WEBOS_LOCAL_PROPERTIES}}"
          if [ -z "${LOCAL_PROPERTIES//[[:space:]]/}" ]; then
            echo "::error::NUVIO_LOCAL_PROPERTIES secret is required to build release artifacts with runtime env."
            exit 1
          fi
          printf '%s\n' "$LOCAL_PROPERTIES" > local.properties
      - name: Install dependencies
        run: npm ci

      - name: Package local Tizen WGT
        env:
          NUVIO_REQUIRE_LOCAL_PROPERTIES: "1"
        run: npm run package:tizen

      - name: Normalize Tizen package metadata
        id: package
        env:
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
        run: |
          set -- NuvioTV001_*.wgt
          if [ ! -e "$1" ]; then
            echo "Expected Tizen package was not created" >&2
            exit 1
          fi
          PACKAGE_FILE="$1"
          TARGET_FILE="NuvioTV-Tizen-${TAG_NAME}.wgt"
          mv "$PACKAGE_FILE" "$TARGET_FILE"
          SHA256=$(shasum -a 256 "$TARGET_FILE" | cut -d' ' -f1)
          SIZE=$(wc -c < "$TARGET_FILE" | tr -d ' ')
          echo "package_name=$TARGET_FILE" >> "$GITHUB_OUTPUT"
          echo "package_sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "package_size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload Tizen WGT to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
          PACKAGE_NAME: ${{ steps.package.outputs.package_name }}
        run: gh release upload "$TAG_NAME" "$PACKAGE_NAME" --clobber

  build-windows-installer-release:
    runs-on: windows-latest
    needs:
      - resolve-release-payload
      - build-webos-release
      - build-tizen-release
    permissions:
      contents: write
    steps:
      - name: Check out installer repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.INSTALLER_REPO || 'NuvioMedia/NuvioWebTVInstaller' }}
          token: ${{ secrets.REPO_DISPATCH_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install installer dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Normalize installer artifact
        id: installer
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
        run: |
          $asset = Get-ChildItem -Path "dist" -Filter "*.exe" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $asset) {
            Write-Error "Expected Windows installer .exe was not created"
            exit 1
          }
          $targetFile = "Nuvio-WebTV-Installer-Windows-$env:TAG_NAME.exe"
          Move-Item -Force -Path $asset.FullName -Destination $targetFile
          "installer_name=$targetFile" >> $env:GITHUB_OUTPUT

      - name: Upload Windows installer to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
          INSTALLER_NAME: ${{ steps.installer.outputs.installer_name }}
          SOURCE_REPO: ${{ github.repository }}
        run: gh release upload "$env:TAG_NAME" "$env:INSTALLER_NAME" --repo "$env:SOURCE_REPO" --clobber

  build-mac-installer-release:
    runs-on: macos-latest
    needs:
      - resolve-release-payload
      - build-webos-release
      - build-tizen-release
    permissions:
      contents: write
    steps:
      - name: Check out installer repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.INSTALLER_REPO || 'NuvioMedia/NuvioWebTVInstaller' }}
          token: ${{ secrets.REPO_DISPATCH_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install installer dependencies
        run: npm ci

      - name: Build macOS installer
        run: npm run dist:mac

      - name: Package macOS app
        id: installer
        env:
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
        run: |
          APP_PATH="$(find dist -type d -name '*.app' -print | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Expected macOS .app was not created" >&2
            exit 1
          fi
          TARGET_FILE="Nuvio-WebTV-Installer-macOS-${TAG_NAME}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$TARGET_FILE"
          echo "installer_name=$TARGET_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload macOS installer to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
          INSTALLER_NAME: ${{ steps.installer.outputs.installer_name }}
          SOURCE_REPO: ${{ github.repository }}
        run: gh release upload "$TAG_NAME" "$INSTALLER_NAME" --repo "$SOURCE_REPO" --clobber

  build-linux-installer-release:
    runs-on: ubuntu-latest
    needs:
      - resolve-release-payload
      - build-webos-release
      - build-tizen-release
    permissions:
      contents: write
    steps:
      - name: Check out installer repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.INSTALLER_REPO || 'NuvioMedia/NuvioWebTVInstaller' }}
          token: ${{ secrets.REPO_DISPATCH_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install installer dependencies
        run: npm ci

      - name: Build Linux installer
        run: npm run dist:linux

      - name: Normalize installer artifact
        id: installer
        env:
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
        run: |
          APPIMAGE_PATH="$(find dist -type f -name '*.AppImage' -print | head -n 1)"
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "Expected Linux AppImage was not created" >&2
            exit 1
          fi
          TARGET_FILE="Nuvio-WebTV-Installer-Linux-${TAG_NAME}.AppImage"
          mv "$APPIMAGE_PATH" "$TARGET_FILE"
          chmod +x "$TARGET_FILE"
          echo "installer_name=$TARGET_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload Linux installer to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.resolve-release-payload.outputs.tag }}
          INSTALLER_NAME: ${{ steps.installer.outputs.installer_name }}
          SOURCE_REPO: ${{ github.repository }}
        run: gh release upload "$TAG_NAME" "$INSTALLER_NAME" --repo "$SOURCE_REPO" --clobber
