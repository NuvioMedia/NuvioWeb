<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  background:black;
  overflow:hidden;
}

#yt {
  width:100vw;
  height:100vh;
  border:0;
}
</style>
</head>

<body>

<iframe
 id="yt"
 allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
 allowfullscreen>
</iframe>

<script>
const params = new URLSearchParams(location.search);
const v = params.get("v");

document.getElementById("yt").src =
`https://www.youtube-nocookie.com/embed/${v}?autoplay=1&mute=1&controls=0&playsinline=1&rel=0`;
</script>

</body>
</html>
